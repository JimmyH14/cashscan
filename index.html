<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CashScan — Trouve tes remboursements</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --accent: #c8f542;
    --accent2: #42f5a8;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --border: #2a2a38;
    --danger: #ff4f6d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.3;
  }

  header {
    width: 100%;
    max-width: 480px;
    padding: 28px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.04em;
  }
  .logo span { color: var(--accent); }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 400;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  main {
    width: 100%;
    max-width: 480px;
    padding: 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ---- Scanner zone ---- */
  .scanner-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }

  .scanner-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  .dot.red { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
  .dot.off { background: var(--muted); box-shadow: none; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .scanner-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  #scanner-container {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #scanner-container video,
  #scanner-container canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
  }

  #scanner-container canvas { opacity: 0 !important; }

  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  .scan-frame {
    width: 220px;
    height: 100px;
    position: relative;
  }

  .scan-frame::before,
  .scan-frame::after,
  .scan-frame .corner-br,
  .scan-frame .corner-bl {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--accent);
    border-style: solid;
  }
  .scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; }
  .scan-frame::after { top: 0; right: 0; border-width: 3px 3px 0 0; }
  .scan-frame .corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; }
  .scan-frame .corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; }

  .scan-line {
    position: absolute;
    top: 0; left: 4px; right: 4px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 8px var(--accent);
    animation: scanMove 2s ease-in-out infinite;
  }
  @keyframes scanMove {
    0%, 100% { top: 4px; }
    50% { top: calc(100% - 4px); }
  }

  .scanner-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--muted);
  }

  .scanner-placeholder svg {
    width: 48px; height: 48px;
    opacity: 0.4;
  }

  .scanner-placeholder p {
    font-size: 0.85rem;
    font-family: 'DM Mono', monospace;
    text-align: center;
  }

  .scanner-actions {
    padding: 16px 20px;
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.02em;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* Manual input */
  .manual-row {
    display: flex;
    gap: 8px;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .input-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-wrap input:focus { border-color: var(--accent); }
  .input-wrap input::placeholder { color: var(--muted); }

  .btn-search {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 13px 18px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-search:hover { filter: brightness(1.1); }
  .btn-search:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 16px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .product-name {
    font-size: 1rem;
    font-weight: 700;
  }

  .barcode-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--surface);
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .result-body {
    padding: 20px;
  }

  /* Loading */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 32px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* Offers */
  .offers-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .offer-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.2s;
  }
  .offer-item:hover { border-color: var(--accent2); }

  .offer-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--accent);
    color: #000;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    font-weight: 800;
  }

  .offer-icon.green { background: var(--accent2); }
  .offer-icon.blue { background: #42b4f5; }
  .offer-icon.orange { background: #f5a242; }
  .offer-icon.purple { background: #a842f5; }

  .offer-details { flex: 1; min-width: 0; }

  .offer-platform {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .offer-desc {
    font-size: 0.88rem;
    font-weight: 600;
    margin: 2px 0 4px;
    line-height: 1.3;
  }

  .offer-amount {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--accent);
    background: rgba(200, 245, 66, 0.1);
    padding: 2px 8px;
    border-radius: 6px;
    border: 1px solid rgba(200, 245, 66, 0.2);
  }

  .offer-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    transition: color 0.2s;
  }
  .offer-link:hover { color: var(--accent2); }

  .no-offers {
    text-align: center;
    padding: 24px;
    color: var(--muted);
  }
  .no-offers .emoji { font-size: 2rem; display: block; margin-bottom: 8px; }
  .no-offers p { font-size: 0.85rem; font-family: 'DM Mono', monospace; }

  .section-title {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .summary-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .summary-chip {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }

  .summary-chip .val {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--accent);
    display: block;
  }
  .summary-chip .lbl {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .error-msg {
    background: rgba(255, 79, 109, 0.1);
    border: 1px solid rgba(255, 79, 109, 0.3);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 0.85rem;
    color: var(--danger);
    font-family: 'DM Mono', monospace;
  }

  /* Tip */
  .tip {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-align: center;
    line-height: 1.6;
    padding: 0 8px;
  }
  .tip a { color: var(--accent2); text-decoration: none; }

  /* Success flash */
  .flash {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--accent);
    color: #000;
    padding: 10px 20px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 0.85rem;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    white-space: nowrap;
  }
  .flash.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    main { padding: 16px; }
  }
</style>
</head>
<body>

<div class="flash" id="flash">✓ Code-barres détecté !</div>

<header>
  <div class="logo">Cash<span>Scan</span></div>
  <div class="badge">Beta</div>
</header>

<main>

  <!-- Scanner -->
  <div class="scanner-card">
    <div class="scanner-header">
      <div class="dot off" id="scanner-dot"></div>
      <span class="scanner-label" id="scanner-status">Caméra inactive</span>
    </div>

    <div id="scanner-container">
      <div class="scanner-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="7" y1="8" x2="7" y2="16"/>
          <line x1="9" y1="8" x2="9" y2="16"/>
          <line x1="11" y1="8" x2="11" y2="16"/>
          <line x1="13" y1="8" x2="13" y2="16"/>
          <line x1="15" y1="8" x2="15" y2="16"/>
          <line x1="17" y1="8" x2="17" y2="16"/>
        </svg>
        <p>Appuie sur Scanner<br>pour activer la caméra</p>
      </div>
      <div class="scan-overlay" id="scan-overlay" style="display:none">
        <div class="scan-frame">
          <div class="corner-br"></div>
          <div class="corner-bl"></div>
          <div class="scan-line"></div>
        </div>
      </div>
    </div>

    <div class="scanner-actions">
      <button class="btn btn-primary" id="btn-scan" onclick="toggleScanner()">
        📷 Scanner
      </button>
      <button class="btn btn-secondary" id="btn-stop" onclick="stopScanner()" disabled>
        ⏹ Arrêter
      </button>
    </div>
  </div>

  <!-- Manual input -->
  <div class="manual-row">
    <div class="input-wrap">
      <input type="text" id="manual-code" placeholder="Ou saisis un code-barres..." maxlength="20" 
        oninput="this.value=this.value.replace(/\D/g,'')"
        onkeydown="if(event.key==='Enter') searchManual()">
    </div>
    <button class="btn-search" id="btn-manual" onclick="searchManual()">
      🔍 Go
    </button>
  </div>

  <!-- Result zone -->
  <div id="result-zone"></div>

  <p class="tip">
    CashScan interroge l'IA pour trouver des offres sur<br>
    Shopmium · Coupon Network · Jow · Poulpe · Ibotta<br>
    <br>⚠️ Les offres sont indicatives — vérifie toujours sur les apps officielles.
  </p>

</main>

<script>
let scannerRunning = false;
let lastScanned = '';
let scanCooldown = false;

function toggleScanner() {
  if (!scannerRunning) startScanner();
}

function startScanner() {
  const container = document.getElementById('scanner-container');
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('scan-overlay').style.display = 'flex';
  document.getElementById('scanner-dot').className = 'dot';
  document.getElementById('scanner-status').textContent = 'Scanner actif...';
  document.getElementById('btn-scan').disabled = true;
  document.getElementById('btn-stop').disabled = false;

  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.getElementById('scanner-container'),
      constraints: {
        facingMode: "environment",
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    },
    decoder: {
      readers: ["ean_reader", "ean_8_reader", "upc_reader", "upc_e_reader", "code_128_reader"]
    },
    locate: true,
    frequency: 5
  }, function(err) {
    if (err) {
      showError("Impossible d'accéder à la caméra : " + err.message);
      resetScannerUI();
      return;
    }
    Quagga.start();
    scannerRunning = true;
  });

  Quagga.onDetected(function(result) {
    const code = result.codeResult.code;
    if (!code || scanCooldown || code === lastScanned) return;
    
    // Confidence check
    const counts = result.codeResult.decodedCodes;
    const errors = counts.filter(x => x.error !== undefined).map(x => x.error);
    const avgError = errors.length ? errors.reduce((a,b) => a+b, 0) / errors.length : 1;
    if (avgError > 0.25) return;

    lastScanned = code;
    scanCooldown = true;
    setTimeout(() => { scanCooldown = false; }, 3000);

    showFlash();
    stopScanner();
    document.getElementById('manual-code').value = code;
    searchOffers(code);
  });
}

function stopScanner() {
  if (scannerRunning) {
    Quagga.stop();
    scannerRunning = false;
  }
  resetScannerUI();
}

function resetScannerUI() {
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('scan-overlay').style.display = 'none';
  document.getElementById('scanner-dot').className = 'dot off';
  document.getElementById('scanner-status').textContent = 'Caméra inactive';
  document.getElementById('btn-scan').disabled = false;
  document.getElementById('btn-stop').disabled = true;
}

function searchManual() {
  const code = document.getElementById('manual-code').value.trim();
  if (!code || code.length < 4) return;
  searchOffers(code);
}

function showFlash() {
  const f = document.getElementById('flash');
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 2500);
}

function showError(msg) {
  document.getElementById('result-zone').innerHTML = `<div class="error-msg">❌ ${msg}</div>`;
}

async function searchOffers(barcode) {
  const zone = document.getElementById('result-zone');
  zone.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <span class="product-name">Recherche en cours...</span>
        <span class="barcode-tag">${barcode}</span>
      </div>
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Interrogation des bases d'offres...<br>Shopmium · Coupon Network · Jow · Poulpe</div>
      </div>
    </div>`;

  try {
    const prompt = `Tu es un expert des applications de cashback et remboursement en France.
Un utilisateur vient de scanner le code-barres EAN/UPC : ${barcode}

ÉTAPE 1 — Identifie le produit.
Cherche dans ta connaissance des produits courants en France à partir du code-barres. Si tu ne connais pas ce code précis, décris le type de produit probable selon le préfixe EAN (ex: 3xxx = France/Monaco).

ÉTAPE 2 — Indique les offres de remboursement.
Pour ce produit (ou sa catégorie), donne des exemples réalistes d'offres disponibles ou ayant été disponibles sur ces plateformes françaises :
- Shopmium
- Coupon Network (Coupons.fr)
- Jow
- Poulpe
- Ibotta (si disponible en France)
- Prixing
- Toutes autres apps françaises de cashback pertinentes

IMPORTANT : Réponds UNIQUEMENT en JSON valide, sans backticks, sans texte avant ou après. Format exact :
{
  "product_name": "Nom du produit identifié",
  "product_category": "Catégorie (ex: Yaourts, Céréales, Boissons...)",
  "confidence": "high|medium|low",
  "barcode_origin": "Pays d'origine selon le préfixe EAN",
  "offers": [
    {
      "platform": "Shopmium",
      "description": "Description courte de l'offre",
      "amount": "ex: -0,80€ remboursé",
      "conditions": "ex: Sur 1 achat, valable jusqu'au...",
      "url": "https://www.shopmium.com",
      "icon": "🛒",
      "color": "green"
    }
  ],
  "tips": "Conseil rapide pour maximiser les économies",
  "max_savings": "Économie maximale possible en cumulant les offres"
}

Si aucune offre connue, mets un tableau offers vide mais donne quand même les infos produit.`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    
    // Extract text from possibly mixed content blocks
    let rawText = '';
    if (data.content) {
      rawText = data.content
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('');
    }

    // Parse JSON
    let result;
    try {
      const clean = rawText.replace(/```json|```/g, '').trim();
      result = JSON.parse(clean);
    } catch(e) {
      // Fallback: try to extract JSON with regex
      const match = rawText.match(/\{[\s\S]*\}/);
      if (match) result = JSON.parse(match[0]);
      else throw new Error("Impossible de parser la réponse");
    }

    renderResult(barcode, result);

  } catch(err) {
    zone.innerHTML = `<div class="error-msg">❌ Erreur lors de la recherche : ${err.message}</div>`;
  }
}

function renderResult(barcode, data) {
  const zone = document.getElementById('result-zone');
  const offers = data.offers || [];
  const conf = { high: '✓ Identifié', medium: '~ Probable', low: '? Incertain' }[data.confidence] || '';
  const confColor = { high: '#c8f542', medium: '#f5a242', low: '#ff4f6d' }[data.confidence] || '#6b6b80';

  let offersHTML = '';

  if (offers.length === 0) {
    offersHTML = `
      <div class="no-offers">
        <span class="emoji">🔍</span>
        <p>Aucune offre de remboursement connue<br>pour ce produit en ce moment.</p>
      </div>`;
  } else {
    offersHTML = `
      <div class="summary-bar">
        <div class="summary-chip">
          <span class="val">${offers.length}</span>
          <span class="lbl">Offre${offers.length > 1 ? 's' : ''}</span>
        </div>
        <div class="summary-chip">
          <span class="val" style="font-size:0.95rem">${data.max_savings || 'N/A'}</span>
          <span class="lbl">Économie max</span>
        </div>
      </div>
      <div class="section-title">Offres disponibles</div>
      <div class="offers-list">
        ${offers.map(offer => `
          <div class="offer-item">
            <div class="offer-icon ${offer.color || ''}">${offer.icon || '🏷️'}</div>
            <div class="offer-details">
              <div class="offer-platform">${offer.platform}</div>
              <div class="offer-desc">${offer.description}</div>
              <span class="offer-amount">${offer.amount}</span>
              ${offer.conditions ? `<div style="font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px">${offer.conditions}</div>` : ''}
              ${offer.url ? `<a href="${offer.url}" target="_blank" class="offer-link">↗ Voir l'offre</a>` : ''}
            </div>
          </div>
        `).join('')}
      </div>`;
  }

  if (data.tips) {
    offersHTML += `
      <div style="margin-top:16px;padding:12px 14px;background:rgba(66,245,168,0.08);border:1px solid rgba(66,245,168,0.2);border-radius:10px;font-size:0.78rem;font-family:'DM Mono',monospace;color:#42f5a8;line-height:1.5">
        💡 ${data.tips}
      </div>`;
  }

  zone.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div>
          <div class="product-name">${data.product_name || 'Produit inconnu'}</div>
          <div style="font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px">
            ${data.product_category || ''} · <span style="color:${confColor}">${conf}</span>
          </div>
        </div>
        <span class="barcode-tag">${barcode}</span>
      </div>
      <div class="result-body">
        ${offersHTML}
      </div>
    </div>`;
}
</script>
</body>
</html>
